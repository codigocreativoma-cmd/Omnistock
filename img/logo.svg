<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main Shape: Abstract Isometric Stack / Omni Circle -->
  <g filter="url(#softShadow)">
    <!-- Base Container: Rounded Square (Optional background, kept subtle or removed for pure logo) -->
    <!-- Using a centralized geometric symbol -->
    
    <!-- Left Pillar (Stock) -->
    <rect x="58" y="100" width="40" height="80" rx="8" fill="url(#mainGrad)" />
    
    <!-- Middle Pillar (Growth) -->
    <rect x="108" y="60" width="40" height="120" rx="8" fill="url(#mainGrad)" opacity="0.9" />
    
    <!-- Right Pillar (Peak) -->
    <rect x="158" y="30" width="40" height="150" rx="8" fill="url(#mainGrad)" opacity="0.8" />
    
    <!-- Connecting Arc (The 'Omni' aspect) -->
    <path d="M48 200 C 48 230, 208 230, 208 200" 
          fill="none" 
          stroke="url(#mainGrad)" 
          stroke-width="12" 
          stroke-linecap="round"
          opacity="0.6" />
          
    <circle cx="178" cy="50" r="6" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
